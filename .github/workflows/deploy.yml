name: Deploy AirData OWL Documentation

on:
  push:
    branches: ["main"]
    paths:
      - "ontology/**"
      - "src/**"
      - "config/**"
      - "tools/**"
      - "make.py"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ontology/**"
      - "src/**"
      - "config/**"
      - "tools/**"
      - "make.py"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_lessonia:
        description: "Deploy generated site to Lessonia"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "airdata-ontology-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "config/requirements.txt"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt

      - name: Show selected ontology
        run: python make.py status
          
      - name: Build OWL Reports and Documentation
        run: python make.py all

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload generated site artifact
        uses: actions/upload-artifact@v4
        with:
          name: airdata-ontology-site
          path: ./output/site
          if-no-files-found: error

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/site

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-lessonia:
    name: Deploy to Lessonia
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name != 'pull_request' &&
      vars.LESSONIA_DEPLOY_ENABLED == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_lessonia)
    env:
      LESSONIA_HOST: ${{ secrets.LESSONIA_HOST }}
      LESSONIA_PORT: ${{ secrets.LESSONIA_PORT || '2222' }}
      LESSONIA_USER: ${{ secrets.LESSONIA_USER }}
      LESSONIA_PASSWORD: ${{ secrets.LESSONIA_PASSWORD }}
      LESSONIA_PATH: ${{ secrets.LESSONIA_PATH }}
    steps:
      - name: Check Lessonia secrets
        id: lessonia_secrets
        shell: bash
        run: |
          if [[ -n "$LESSONIA_HOST" && -n "$LESSONIA_USER" && -n "$LESSONIA_PASSWORD" && -n "$LESSONIA_PATH" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Lessonia deploy skipped because one or more secrets are missing."
          fi

      - name: Download generated site artifact
        if: steps.lessonia_secrets.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: airdata-ontology-site
          path: ./site

      - name: Install SSH deploy tools
        if: steps.lessonia_secrets.outputs.configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Deploy generated site to Lessonia
        if: steps.lessonia_secrets.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sshpass -p "$LESSONIA_PASSWORD" ssh \
            -p "$LESSONIA_PORT" \
            -o StrictHostKeyChecking=accept-new \
            "$LESSONIA_USER@$LESSONIA_HOST" \
            "mkdir -p '$LESSONIA_PATH'"

          sshpass -p "$LESSONIA_PASSWORD" rsync -az --delete \
            -e "ssh -p $LESSONIA_PORT -o StrictHostKeyChecking=accept-new" \
            ./site/ \
            "$LESSONIA_USER@$LESSONIA_HOST:$LESSONIA_PATH/"
